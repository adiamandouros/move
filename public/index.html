<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move — Athens Transit</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="/public/icon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/public/icon/favicon.svg" />
    <link rel="shortcut icon" href="/public/icon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/public/icon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Move" />
    <link rel="manifest" href="/icon/site.webmanifest" />
</head>
<body>

    <!-- Skip link for keyboard users -->
    <a href="#app-content" class="skip-link">Skip to content</a>

    <div id="layout">

        <!-- Sidebar (desktop) -->
        <nav id="side-nav" class="d-none d-md-flex flex-column border-end" aria-label="Main navigation">
            <div class="side-nav-brand px-3 py-4">
                <span class="fw-bold fs-4 text-primary" role="heading" aria-level="1">Move</span>
            </div>
            <div class="d-flex flex-column flex-grow-1 px-2">
                <div class="mt-auto pb-3">
                    <button id="lang-toggle-side" class="lang-toggle-btn btn d-flex align-items-center gap-3 px-3 py-2 w-100" aria-label="Switch language">
                        <i class="bi bi-globe fs-5" aria-hidden="true"></i>
                        <div class="lang-options" aria-hidden="true">
                            <span class="lang-opt" data-lang="en">EN</span>
                            <span class="lang-sep">/</span>
                            <span class="lang-opt" data-lang="el">ΕΛ</span>
                        </div>
                    </button>
                </div>
                <button class="nav-btn btn d-flex align-items-center gap-3 px-3 py-3 mb-1"
                        data-tool="nearby-buses"
                        aria-current="false">
                    <i class="bi bi-bus-front fs-5" aria-hidden="true"></i>
                    <span data-i18n="nav.nearby-buses">Nearby Buses</span>
                </button>
                <button class="nav-btn btn d-flex align-items-center gap-3 px-3 py-3 mb-1"
                        data-tool="subway-position"
                        aria-current="false">
                    <i class="bi bi-train-front fs-5" aria-hidden="true"></i>
                    <span data-i18n="nav.subway">Subway</span>
                </button>
            </div>
        </nav>

        <!-- Main content area -->
        <main id="app-content" tabindex="-1" aria-label="Tool content">
            <div id="view-placeholder" class="d-flex flex-column align-items-center justify-content-center text-muted h-100">
                <i class="bi bi-bus-front fs-1 mb-3" aria-hidden="true"></i>
                <p class="fs-5" data-i18n="nav.select-tool">Select a tool</p>
            </div>
        </main>

    </div>

    <!-- Bottom nav (mobile) -->
    <nav id="bottom-nav" class="d-flex d-md-none fixed-bottom border-top" aria-label="Main navigation">
        <button id="lang-toggle-bottom" class="nav-btn btn d-flex flex-column align-items-center py-2" aria-label="Switch language">
            <i class="bi bi-globe fs-4" aria-hidden="true"></i>
            <div class="lang-options" aria-hidden="true">
                <span class="lang-opt" data-lang="en">EN</span>
                <span class="lang-sep">/</span>
                <span class="lang-opt" data-lang="el">ΕΛ</span>
            </div>
        </button>
        <button class="nav-btn btn d-flex flex-column align-items-center py-2"
                data-tool="nearby-buses"
                aria-current="false">
            <i class="bi bi-bus-front fs-4" aria-hidden="true"></i>
            <span class="nav-label" data-i18n="nav.nearby-buses.short">Nearby</span>
        </button>
        <button class="nav-btn btn d-flex flex-column align-items-center py-2"
                data-tool="subway-position"
                aria-current="false">
            <i class="bi bi-train-front fs-4" aria-hidden="true"></i>
            <span class="nav-label" data-i18n="nav.subway">Subway</span>
        </button>
    </nav>

    <!-- Live region for screen reader announcements (visually hidden) -->
    <div id="sr-announcer" aria-live="polite" aria-atomic="true" class="sr-only"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'activated') {
                            window.location.reload();
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
